<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout de Teste</title>
  <!-- Meta Pixel Code -->

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: #fff;
      min-height: 100vh;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 34px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    h1 {
      font-size: 30px;
      margin: 0 0 10px;
      text-align: center;
    }

    p {
      text-align: center;
      color: rgba(255,255,255,0.78);
      margin-bottom: 24px;
    }

    .box {
      background: rgba(255,255,255,0.04);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 20px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 10px 0;
      font-size: 15px;
    }

    .label { opacity: 0.7; }
    .value { font-weight: bold; }

    .btn {
      width: 100%;
      padding: 18px 24px;
      border: none;
      border-radius: 14px;
      background: #22c55e;
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.25s ease;
      box-shadow: 0 14px 30px rgba(34,197,94,0.25);
    }

    .btn:hover {
      background: #16a34a;
      transform: translateY(-2px);
    }

    .status {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
      color: #86efac;
      min-height: 20px;
    }

    .debug {
      margin-top: 20px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      font-size: 12px;
      color: rgba(255,255,255,0.65);
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Checkout de Teste</h1>
      <p>Simulação de checkout para validar o webhook de compra.</p>

      <div class="box">
        <div class="row">
          <span class="label">Produto</span>
          <span class="value">Produto Teste</span>
        </div>
        <div class="row">
          <span class="label">Oferta</span>
          <span class="value">Oferta Principal</span>
        </div>
        <div class="row">
          <span class="label">Valor</span>
          <span class="value">R$ 29,90</span>
        </div>
      </div>

      <button class="btn" id="btnFinalizar">
        Finalizar Compra
      </button>

      <div class="status" id="statusBox"></div>

      <div class="debug" id="debugBox">
        Carregando dados do checkout...
      </div>
    </div>
  </div>

  <script>
    (function () {
      const API_URL = "https://api-trackeamento.onrender.com";
      const TEST_EVENT_CODE = "TEST10962";
      const KEY = {
        SESSION_ID: "trk_session_id",
        LAST_PURCHASE_EVENT_ID: "trk_last_purchase_event_id"
      };

      function getQueryParam(name) {
        const url = new URL(window.location.href);
        return url.searchParams.get(name);
      }

      function getCookie(name) {
        const match = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
        return match ? match[2] : null;
      }

      function createEventId(prefix) {
        return prefix + "_" + Date.now() + "_" + Math.random().toString(36).slice(2, 10);
      }

      function getSourceEventId() {
        return getQueryParam("source_event_id") || localStorage.getItem("trk_last_source_event_id") || localStorage.getItem("trk_event_id_PageView") || null;
      }

      function getCheckoutEventId() {
        return getQueryParam("checkout_event_id") || getQueryParam("src") || getQueryParam("sck") || localStorage.getItem("trk_last_checkout_event_id") || localStorage.getItem("trk_event_id_InitiateCheckout") || null;
      }

      function randomTransactionId() {
        return "txn_" + Date.now();
      }

      function setStatus(msg, isError = false) {
        const box = document.getElementById("statusBox");
        box.style.color = isError ? "#fca5a5" : "#86efac";
        box.textContent = msg;
      }

      function renderDebug(extra = {}) {
        const sourceEventId = getSourceEventId();
        const checkoutEventId = getCheckoutEventId();
        document.getElementById("debugBox").innerHTML = `
          <strong>source_event_id:</strong> ${sourceEventId || "-"}<br>
          <strong>checkout_event_id:</strong> ${checkoutEventId || "-"}<br>
          <strong>purchase_event_id:</strong> ${extra.purchaseEventId || localStorage.getItem(KEY.LAST_PURCHASE_EVENT_ID) || "-"}<br>
          <strong>provider:</strong> fake_checkout<br>
          <strong>transaction_id:</strong> ${extra.transactionId || "gerado no clique"}
        `;
      }

      async function sendTrackEvent(eventName, eventId, customData) {
        const payload = {
          event_name: eventName,
          event_id: eventId,
          session_id: localStorage.getItem(KEY.SESSION_ID) || null,
          fbp: getCookie("_fbp") || null,
          fbc: getCookie("_fbc") || null,
          page_url: window.location.href,
          referrer: document.referrer || null,
          user_agent: navigator.userAgent,
          screen: window.screen.width + "x" + window.screen.height,
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
          test_event_code: TEST_EVENT_CODE,
          ...customData
        };

        try {
          await fetch(API_URL + "/track", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
            keepalive: true
          });
        } catch (err) {
          console.warn("[checkout-track] falha ao enviar", eventName, err);
        }
      }

      async function registerCheckoutLanding() {
        const pageViewId = localStorage.getItem("trk_checkout_pageview_id") || createEventId("CheckoutPageView");
        const viewContentId = localStorage.getItem("trk_checkout_viewcontent_id") || createEventId("CheckoutViewContent");
        localStorage.setItem("trk_checkout_pageview_id", pageViewId);
        localStorage.setItem("trk_checkout_viewcontent_id", viewContentId);

        try {
          if (window.fbq) {
            fbq("track", "PageView", {}, { eventID: pageViewId });
            fbq("track", "ViewContent", { content_name: document.title }, { eventID: viewContentId });
          }
        } catch (err) {
          console.warn("[checkout-pixel] falha ao disparar landing events", err);
        }

        await Promise.allSettled([
          sendTrackEvent("PageView", pageViewId),
          sendTrackEvent("ViewContent", viewContentId, { content_name: document.title })
        ]);
      }

      async function sendWebhookPurchase() {
        const button = document.getElementById("btnFinalizar");
        const source_event_id = getSourceEventId();
        const checkout_event_id = getCheckoutEventId();

        if (!source_event_id && !checkout_event_id) {
          setStatus("IDs de origem não encontrados. Volte para a página inicial e refaça o fluxo.", true);
          return;
        }

        button.disabled = true;
        button.style.opacity = "0.7";
        button.textContent = "Processando...";

        const transaction_id = randomTransactionId();
        const purchase_event_id = "Purchase_" + transaction_id;
        const payload = {
          provider: "fake_checkout",
          source_event_id: source_event_id || null,
          checkout_event_id: checkout_event_id || null,
          purchase_event_id,
          transaction_id,
          status: "approved",
          value: 29.90,
          currency: "BRL",
          buyer_name: "Cliente Teste",
          buyer_email: "teste@email.com",
          buyer_phone: "11999999999",
          product_id: "produto_teste",
          product_name: "Produto Teste",
          offer_id: "oferta_teste",
          offer_name: "Oferta Principal",
          buyer_country: "BR",
          buyer_state: "RJ",
          buyer_city: "Barra Mansa",
          is_test: true,
          test_event_code: TEST_EVENT_CODE
        };

        localStorage.setItem(KEY.LAST_PURCHASE_EVENT_ID, purchase_event_id);
        renderDebug({ transactionId: transaction_id, purchaseEventId: purchase_event_id });

        try {
          if (window.fbq) {
            fbq("track", "Purchase", {
              value: 29.90,
              currency: "BRL",
              content_name: "Produto Teste"
            }, { eventID: purchase_event_id });
          }
        } catch (err) {
          console.warn("[purchase-pixel] falha ao disparar Purchase no navegador", err);
        }

        try {
          const res = await fetch(API_URL + "/webhook", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload),
            keepalive: true
          });

          const raw = await res.text();
          let data = null;
          try {
            data = raw ? JSON.parse(raw) : null;
          } catch (_) {
            data = { raw };
          }

          console.log("[webhook] status", res.status, "resposta", data);

          if (!res.ok || (data && data.success === false)) {
            throw new Error((data && data.error) || "Erro ao finalizar compra");
          }

          setStatus("Compra simulada enviada. Purchase do navegador disparado e webhook processado.");
        } catch (err) {
          console.error("[webhook] erro", err);
          setStatus("Purchase do navegador foi disparado, mas o webhook falhou ou demorou demais.", true);
        } finally {
          button.disabled = false;
          button.style.opacity = "1";
          button.textContent = "Finalizar Compra";
        }
      }

      document.getElementById("btnFinalizar").addEventListener("click", sendWebhookPurchase);

      window.addEventListener("load", function () {
        registerCheckoutLanding();
        renderDebug();
      });
    })();
  </script>
</body>
</html>
